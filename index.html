<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1>Expense Tracker</h1>
    <div class="container">
        <h3 class="h3">YOUR BALANCE</h3>
        <h1 class="your-balance">$0.00</h1>

        <div class="inc-exp-container">

            <div class="income">
                <h3>INCOME</h3>
                <p>+$0.00</p>
            </div>
            <div class="expense">
                <h3>EXPENSE</h3>
                <p>-$0.00</p>
            </div>
        </div>

        <h3 class="h3">HISTORY</h3>
        <ul id="list">
        
        </ul>

        <h3 class="h3">ADD NEW TRANSITION</h3>
        <form action="">
            <label for="text">Text :-</label>
            <input type="text" name="" id="text" placeholder="Enter Text...">

            <label for="amount">Amount :-</label>
            <input type="text" name="" id="amount" placeholder="Enter Amount...">

        </form>

        <button id="all-transaction">All Transaction</button>
    </div>
    <script src="script.js"></script>
</body>

</html>
